services:
  - type: web
    name: problemmarket-backend
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm install
    startCommand: npm run start:with:migrate
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_SSL
        value: "true"
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: problemmarket-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: problemmarket-db
    databaseName: problemmarket
    user: problemmarket
    plan: starter
